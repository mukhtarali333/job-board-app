<nav class="navbar">
  <div class="container">

    <a routerLink="/" class="logo" (click)="closeMenu()">
      <span class="logo-icon">💼</span>
      <span class="logo-text">JobBoard</span>
    </a>

    <ul class="nav-links" [class.open]="isMenuOpen()">
      <li>
        <a routerLink="/"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{exact: true}"
           (click)="closeMenu()">
          Home
        </a>
      </li>
      <li>
        <a routerLink="/jobs"
           routerLinkActive="active"
           (click)="closeMenu()">
          Jobs
        </a>
      </li>
      <li>
        <a routerLink="/login"
           class="btn-outline"
           (click)="closeMenu()">
          Login
        </a>
      </li>
      <li>
        <a routerLink="/register"
           class="btn-primary"
           (click)="closeMenu()">
          Register
        </a>
      </li>
    </ul>

    <button class="menu-toggle"
            [class.active]="isMenuOpen()"
            (click)="toggleMenu()"
            aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>
</nav>
